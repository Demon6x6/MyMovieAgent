name: Daily Movie Agent Update

on:
  schedule:
    # Gira ogni giorno alle 08:00 UTC (che corrispondono alle 10:00 italiane estive)
    - cron: '0 8 * * *'
  workflow_dispatch: # Questo ci permette di avviarlo a mano quando vogliamo fare un test!

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Controlla il codice del repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa le dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esegui lo script dell'Agente
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python update_catalog.py

      - name: Salva le modifiche nel database del repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add database.json
          git commit -m "Aggiornamento quotidiano del catalogo film" || echo "Nessuna modifica da salvare"
          git push
